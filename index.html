<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMS-SPARC International Hospital</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- FRONT PAGE / LOGIN -->
<div class="login-container" id="loginPage">
    <div class="login-box">
        <img src="https://cdn-icons-png.flaticon.com/512/2966/2966486.png" width="80">
        <h1>HMS-SPARC</h1>
        <h3>International Hospital</h3>
        <p class="tagline">World Class Healthcare with Compassion</p>
        <input type="password" id="password" placeholder="Enter Admin Password" value="HMS">
        <button onclick="checkLogin()">LOGIN TO SYSTEM</button>
        <p style="font-size:12px; color:gray; margin-top:10px;">Default Password: HMS</p>
    </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
    <div class="header">
        <div>
            <h2>🏥 HMS-SPARC International Hospital</h2>
            <p>Advanced Patient Management & Billing System</p>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard">
        <div class="card"><h4>Total Patients</h4><h2 id="total">0</h2></div>
        <div class="card"><h4>Admitted</h4><h2 id="admitted">0</h2></div>
        <div class="card"><h4>Discharged</h4><h2 id="discharged">0</h2></div>
        <div class="card"><h4>ICU/Serious</h4><h2 id="icu">0</h2></div>
        <div class="card"><h4>Total Revenue</h4><h2 id="revenue">₹0</h2></div>
    </div>

    <!-- FORM -->
    <div class="form-section">
        <h3>📝 Patient Registration & Billing</h3>
        <div class="form-grid">
            <div class="form-group"><label>🆔 Patient ID</label><input type="text" id="pid" value="Auto Generated" readonly></div>
            <div class="form-group"><label>📅 Date</label><input type="date" id="date"></div>
            <div class="form-group"><label>👤 Patient Name *</label><input type="text" id="name"></div>
            <div class="form-group"><label>🎂 Age</label><input type="number" id="age"></div>
            <div class="form-group"><label>📞 Contact Number *</label><input type="text" id="contact" maxlength="10" pattern="[6-9][0-9]{9} inputmode="numeric"></div>
            <div class="form-group"><label>📍 Address</label><input type="text" id="address"></div>
            <div class="form-group"><label>🩸 Blood Group</label>
                <select id="blood"><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select>
            </div>
            <div class="form-group"><label>💊 Disease / Diagnosis</label><input type="text" id="disease"></div>
            <div class="form-group"><label>📂 Patient Category</label>
                <select id="category">
                    <option>Regular Patient</option>
                    <option>Alternate Patient</option>
                    <option>Accident Case</option>
                    <option>ICU - Serious</option>
                    <option>OPD</option>
                    <option>Emergency</option>
                </select>
            </div>
            <div class="form-group"><label>🏥 Current Status</label>
                <select id="status">
                    <option>Admitted</option>
                    <option>Shifted to General Ward</option>
                    <option>Discharged</option>
                    <option>Under Observation</option>
                </select>
            </div>
            <div class="form-group"><label>👨‍⚕️ Doctor Name</label><input type="text" id="doctor"></div>
            <div class="form-group"><label>🛏️ Room/Bed No</label><input type="text" id="room"></div>

            <!-- PAYMENT DETAILS -->
            <div class="form-group"><label>💰 Advance Payment ₹</label><input type="number" id="advance" onkeyup="calcTotal()"></div>
            <div class="form-group"><label>💊 Medicine Payment ₹</label><input type="number" id="medicine" onkeyup="calcTotal()"></div>
            <div class="form-group"><label>💵 Final Payment ₹</label><input type="number" id="final" onkeyup="calcTotal()"></div>
            <div class="form-group"><label>🧾 Total Bill ₹</label><input type="text" id="totalBill" value="0" readonly></div>

            <div class="form-group"><label>📅 Next Checkup Date</label><input type="date" id="next"></div>
            <div class="form-group" style="grid-column: span 3;"><label>📄 Discharge Summary</label><input type="text" id="discharge"></div>
        </div>

        <div class="btn-group">
            <button class="btn btn-add" onclick="addPatient()">➕ Add Patient</button>
            <button class="btn btn-update" onclick="updatePatient()">✏️ Smart Update</button>
            <button class="btn btn-delete" onclick="deletePatient()">🗑️ Delete</button>
            <button class="btn btn-clear" onclick="clearForm()">🧹 Clear</button>
            <button class="btn btn-export" onclick="exportCSV()">📊 Export CSV</button>
            <button class="btn btn-print" onclick="printSlip()">🖨️ Print Bill</button>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-section">
        <div class="search-bar">
            <input type="text" id="search" placeholder="Search by ID, Name, Contact, Doctor...">
            <button class="btn btn-search" onclick="searchPatient()">🔍 Search</button>
            <button class="btn btn-reset" onclick="showPatients()">Reset</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
